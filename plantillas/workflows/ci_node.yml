name: CI (Node.js)

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Install
        run: npm ci || npm install
      - name: Test
        run: npm test || echo \"No tests\"
